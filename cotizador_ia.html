<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LABO — Cotizador IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0C0C0A;--surface:#141412;--surface2:#1C1C18;
  --border:#2A2A24;--border2:#3A3A32;
  --white:#F5F4F0;--mid:#6A6A60;--muted:#3A3A32;
  --accent:#C8B560;--accent2:#8B7D3A;
  --green:#4A9B6F;--red:#B05040;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;display:flex;flex-direction:column}

/* ── HEADER ── */
.hdr{padding:20px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.hdr-logo svg{height:18px}
.hdr-right{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--mid);text-transform:uppercase}

/* ── MAIN ── */
.main{flex:1;display:grid;grid-template-columns:1fr 380px;max-height:calc(100vh - 61px)}

/* ── CHAT ── */
.chat-area{display:flex;flex-direction:column;border-right:1px solid var(--border)}
.messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:var(--border2)}

.msg{display:flex;gap:12px;max-width:85%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'IBM Plex Mono',monospace;font-weight:500;margin-top:2px}
.msg.ai .msg-avatar{background:var(--accent);color:var(--bg)}
.msg.user .msg-avatar{background:var(--surface2);color:var(--mid);border:1px solid var(--border2)}
.msg-bubble{padding:12px 16px;font-size:14px;line-height:1.6}
.msg.ai .msg-bubble{background:var(--surface);border:1px solid var(--border);border-radius:0 12px 12px 12px}
.msg.user .msg-bubble{background:var(--surface2);border:1px solid var(--border2);border-radius:12px 0 12px 12px;color:var(--white)}

/* Typing indicator */
.typing{display:flex;gap:4px;align-items:center;padding:12px 16px}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ── INPUT ── */
.input-area{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end}
.input-wrap{flex:1;position:relative}
textarea{width:100%;padding:12px 16px;background:var(--surface2);border:1px solid var(--border2);color:var(--white);font-family:'IBM Plex Sans',sans-serif;font-size:14px;resize:none;outline:none;max-height:120px;min-height:44px;line-height:1.5;transition:border .2s}
textarea:focus{border-color:var(--accent2)}
textarea::placeholder{color:var(--mid)}
.send-btn{width:44px;height:44px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.send-btn:hover{background:#D4C070}
.send-btn:disabled{opacity:.3;cursor:not-allowed}
.send-btn svg{width:18px;height:18px}
.mic-btn{width:44px;height:44px;background:var(--surface2);border:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.mic-btn:hover{border-color:var(--accent2)}
.mic-btn.recording{background:var(--red);border-color:var(--red);animation:pulse-mic .8s infinite}
.mic-btn svg{width:18px;height:18px}
@keyframes pulse-mic{0%,100%{opacity:1}50%{opacity:.6}}

/* ── PANEL DERECHO ── */
.panel{background:var(--surface);display:flex;flex-direction:column}
.panel-hdr{padding:18px 20px;border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--mid);text-transform:uppercase}
.panel-body{flex:1;overflow-y:auto;padding:20px}

/* ── COTIZACIÓN PANEL ── */
.cot-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--mid);text-align:center}
.cot-empty-icon{font-size:32px;opacity:.3}
.cot-empty-text{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;line-height:1.8}

.cot-card{display:none}
.cot-card.visible{display:block}
.cot-modelo{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:6px}
.cot-nombre{font-size:18px;font-weight:500;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:14px}

.cot-items{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.cot-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;font-size:12px}
.cot-item.base{background:var(--surface2)}
.cot-item.opt{border-left:2px solid var(--accent2)}
.cot-item-name{color:var(--white);flex:1;padding-right:8px}
.cot-item-price{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mid);white-space:nowrap}

.cot-total{background:var(--accent);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cot-total-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--bg);text-transform:uppercase}
.cot-total-value{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:500;color:var(--bg)}

.cot-fields{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.cot-field{display:flex;flex-direction:column;gap:3px}
.cot-field label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--mid);text-transform:uppercase}
.cot-field input{padding:8px 10px;background:var(--surface2);border:1px solid var(--border2);color:var(--white);font-family:'IBM Plex Sans',sans-serif;font-size:13px;outline:none;transition:border .2s}
.cot-field input:focus{border-color:var(--accent2)}

.btn-pdf{width:100%;padding:12px;background:var(--accent);border:none;color:var(--bg);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .15s;font-weight:500}
.btn-pdf:hover{background:#D4C070}
.btn-pdf:disabled{opacity:.4;cursor:not-allowed}

/* ── CHIPS DE SUGERENCIAS ── */
.chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 24px 16px}
.chip{padding:6px 12px;border:1px solid var(--border2);background:transparent;color:var(--mid);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--accent2);color:var(--white)}

@media(max-width:700px){
  .main{grid-template-columns:1fr;grid-template-rows:1fr auto}
  .panel{max-height:300px}
}
</style>
</head>
<body>

<div class="hdr">
  <svg viewBox="4 0 139 28" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="4" y="0" width="5" height="28" fill="#F5F4F0"/><rect x="4" y="23" width="22" height="5" fill="#F5F4F0"/>
    <rect x="38" y="0" width="5" height="28" fill="#F5F4F0"/><rect x="59" y="0" width="5" height="28" fill="#F5F4F0"/>
    <rect x="38" y="0" width="26" height="5" fill="#F5F4F0"/><rect x="38" y="12" width="26" height="5" fill="#F5F4F0"/>
    <rect x="76" y="0" width="5" height="28" fill="#F5F4F0"/><rect x="76" y="0" width="25" height="5" fill="#F5F4F0"/>
    <rect x="76" y="12" width="22" height="5" fill="#F5F4F0"/><rect x="76" y="23" width="25" height="5" fill="#F5F4F0"/>
    <rect x="96" y="0" width="5" height="17" fill="#F5F4F0"/><rect x="96" y="11" width="5" height="17" fill="#F5F4F0"/>
    <rect x="113" y="0" width="5" height="28" fill="#F5F4F0"/><rect x="134" y="0" width="5" height="28" fill="#F5F4F0"/>
    <rect x="113" y="0" width="26" height="5" fill="#F5F4F0"/><rect x="113" y="23" width="26" height="5" fill="#F5F4F0"/>
  </svg>
  <div class="hdr-right">Cotizador IA — Gerencia Comercial</div>
</div>

<div class="main">
  <!-- CHAT -->
  <div class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="chips" id="chips">
      <div class="chip" onclick="sendChip(this)">Modular M con aire y logística 200km</div>
      <div class="chip" onclick="sendChip(this)">Madera L con todo incluido</div>
      <div class="chip" onclick="sendChip(this)">Modular S básico sin opcionales</div>
      <div class="chip" onclick="sendChip(this)">¿Cuál es el modelo más grande?</div>
    </div>
    <div class="input-area">
      <div class="input-wrap">
        <textarea id="userInput" placeholder="Describí lo que necesitás cotizar..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Hablar">
        <svg id="micIcon" viewBox="0 0 24 24" fill="none" stroke="var(--white)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
      </button>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0C0C0A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <!-- PANEL COTIZACIÓN -->
  <div class="panel">
    <div class="panel-hdr">Cotización en curso</div>
    <div class="panel-body">
      <div class="cot-empty" id="cotEmpty">
        <div class="cot-empty-icon">◫</div>
        <div class="cot-empty-text">Describí lo que necesitás<br>y armo la cotización</div>
      </div>
      <div class="cot-card" id="cotCard">
        <div class="cot-modelo" id="cotModelo"></div>
        <div class="cot-nombre" id="cotNombre"></div>
        <div class="cot-items" id="cotItems"></div>
        <div class="cot-total">
          <span class="cot-total-label">Total oferta</span>
          <span class="cot-total-value" id="cotTotal">USD 0</span>
        </div>
        <!-- Datos mínimos para PDF -->
        <div class="cot-fields">
          <div class="cot-field"><label>Número de oferta</label><input id="pNum" placeholder="OE-0001"></div>
          <div class="cot-field"><label>Cliente</label><input id="pCliente" placeholder="Nombre del cliente"></div>
          <div class="cot-field"><label>Contacto</label><input id="pContacto" placeholder="Nombre de contacto"></div>
          <div class="cot-field"><label>Email</label><input id="pEmail" placeholder="email@ejemplo.com"></div>
          <div class="cot-field"><label>Vendedor</label><input id="pVendedor" placeholder="Tu nombre"></div>
        </div>
        <button class="btn-pdf" id="btnPdf" onclick="generarPDF()">↓ Descargar PDF</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
// ── Pricing data ──────────────────────────────────────────────────────────────
const MARKUP=1.4;
const COSTOS={
  MAD_S:{sup:50,pb:49360.75,op:{"Platea de fundación + Granítico":9833.6,"Termomecánica por AA Split":2240,"Piso Radiante":4704,"Línea Blanca":1680,"Paquete Solar":0,"Estufa a Leña":0,"Pérgola":0,"Deck":0,"Grúa":2912}},
  MAD_M:{sup:67,pb:64658.69,op:{"Platea de fundación + Granítico":14918.4,"Termomecánica por AA Split":3360,"Piso Radiante":5913.6,"Línea Blanca":1680,"Paquete Solar":0,"Estufa a Leña":0,"Pérgola":5644.8,"Deck":0,"Grúa":2912}},
  MAD_L:{sup:148,pb:140060.61,op:{"Platea de fundación + Granítico":30912,"Termomecánica por AA Split":7840,"Piso Radiante":13328,"Línea Blanca":1680,"Paquete Solar":0,"Estufa a Leña":0,"Pérgola":5644.8,"Deck":0,"Grúa":4368}},
  MAD_XL:{sup:190,pb:187659.73,op:{"Platea de fundación + Granítico":43881.6,"Termomecánica por AA Split":11480,"Piso Radiante":17248,"Línea Blanca":1680,"Paquete Solar":0,"Estufa a Leña":0,"Pérgola":5644.8,"Deck":0,"Grúa":5824}},
  S:{sup:65,pb:65749.29,op:{"Platea de fundación + Granítico":4550,"Termomecánica por AA Split":2205,"Piso Radiante":7280,"Línea Blanca":1428,"Paquete Solar":11200,"Estufa a Leña":2100,"Pérgola":2800,"Deck":2800,"Grúa":980}},
  M:{sup:86,pb:79651.88,op:{"Platea de fundación + Granítico":6020,"Termomecánica por AA Split":2205,"Piso Radiante":9632,"Línea Blanca":1428,"Paquete Solar":11200,"Estufa a Leña":2100,"Pérgola":2800,"Deck":2800,"Grúa":980}},
  L:{sup:130,pb:129804.25,op:{"Platea de fundación + Granítico":9100,"Termomecánica por AA Split":4410,"Piso Radiante":14560,"Línea Blanca":1428,"Paquete Solar":16800,"Estufa a Leña":2100,"Pérgola":2800,"Deck":2800,"Grúa":1960}},
  XL:{sup:151,pb:144834.02,op:{"Platea de fundación + Granítico":10570,"Termomecánica por AA Split":4410,"Piso Radiante":16912,"Línea Blanca":1428,"Paquete Solar":19040,"Estufa a Leña":2100,"Pérgola":2800,"Deck":2800,"Grúa":1960}},
};
const COSTOS_LOG_TARIFA={MAD_S:3,MAD_M:6,MAD_L:9,MAD_XL:12,S:6,M:6,L:9,XL:12};
const COSTOS_MONTAJE={
  MAD_S:[6391.13,9551.13,11951.13,12651.13],MAD_M:[10181.35,14601.35,17501.35,18201.35],
  MAD_L:[20711.86,28441.86,33516.86,34616.86],MAD_XL:[25256.68,33866.68,39831.68,41131.68],
  S:[3760,6050,8000,8600],M:[4600,7160,9260,9860],L:[7120,10490,13040,13640],XL:[8800,12710,15560,16160]
};
const LINEA={MAD_S:'madera',MAD_M:'madera',MAD_L:'madera',MAD_XL:'madera',S:'modular',M:'modular',L:'modular',XL:'modular'};
const DNAME={MAD_S:'S',MAD_M:'M',MAD_L:'L',MAD_XL:'XL',S:'S',M:'M',L:'L',XL:'XL'};
const NOMBRES={MAD_S:'LABO Madera S',MAD_M:'LABO Madera M',MAD_L:'LABO Madera L',MAD_XL:'LABO Madera XL',S:'LABO Modular S',M:'LABO Modular M',L:'LABO Modular L',XL:'LABO Modular XL'};

// ── State ─────────────────────────────────────────────────────────────────────
let currentCot = null;
let history = [];
let isThinking = false;

// ── System prompt for Claude ──────────────────────────────────────────────────
const SYSTEM = `Sos el asistente de cotización de LABO, empresa argentina de construcción modular.

Tu tarea es interpretar pedidos de cotización en lenguaje natural y responder con un JSON estructurado.

MODELOS DISPONIBLES:
- LABO Madera: MAD_S (50m²), MAD_M (67m²), MAD_L (148m²), MAD_XL (190m²)
- LABO Modular: S (65m²), M (86m²), L (130m²), XL (151m²)

OPCIONALES DISPONIBLES (exactamente estos nombres):
"Platea de fundación + Granítico", "Termomecánica por AA Split", "Piso Radiante", "Línea Blanca", "Paquete Solar", "Estufa a Leña", "Pérgola", "Deck", "Grúa", "Montaje"

LOGÍSTICA: Se calcula automáticamente si mencionan km (mínimo 100km).

Cuando el usuario pida una cotización, respondé SIEMPRE con este formato JSON exacto al final del mensaje (luego del texto):

<COTIZACION>
{
  "modelo": "M",
  "opcionales": ["Termomecánica por AA Split", "Línea Blanca"],
  "km": 150,
  "cant": 1,
  "mensaje": "Tu respuesta conversacional acá"
}
</COTIZACION>

Si NO hay cotización (pregunta general), respondé solo con texto sin el bloque JSON.

Reglas:
- Siempre respondé en español
- Sé conciso y directo
- Si falta información clave, preguntá solo lo más importante
- "aire acondicionado" = "Termomecánica por AA Split"
- "platea" = "Platea de fundación + Granítico"
- "grúa" = "Grúa"
- "montaje" = "Montaje"
- Si dicen "modular" sin especificar modelo, preguntá cuál (S/M/L/XL)
- Si dicen "madera" sin especificar modelo, preguntá cuál`;

// ── Chat functions ────────────────────────────────────────────────────────────
function addMessage(role, text){
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const initials = role === 'ai' ? 'LA' : 'VO';
  div.innerHTML = `<div class="msg-avatar">${initials}</div><div class="msg-bubble">${text}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping(){
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">LA</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping(){
  const t = document.getElementById('typing');
  if(t) t.remove();
}

async function sendMessage(){
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if(!text || isThinking) return;
  input.value = '';
  autoResize(input);
  document.getElementById('chips').style.display = 'none';
  addMessage('user', escHtml(text));
  history.push({role:'user', content: text});
  await callClaude();
}

function sendChip(el){
  document.getElementById('userInput').value = el.textContent;
  sendMessage();
}

function handleKey(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
}

function autoResize(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Claude API call ───────────────────────────────────────────────────────────
async function callClaude(){
  isThinking = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try{
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });

    const data = await response.json();
    const fullText = data.content && data.content[0] ? data.content[0].text : 'Error al procesar.';
    removeTyping();

    // Parse cotización if present
    const cotMatch = fullText.match(/<COTIZACION>([\s\S]*?)<\/COTIZACION>/);
    let displayText = fullText.replace(/<COTIZACION>[\s\S]*?<\/COTIZACION>/g, '').trim();

    if(cotMatch){
      try{
        const cot = JSON.parse(cotMatch[1].trim());
        procesarCotizacion(cot);
        displayText = cot.mensaje || displayText;
      }catch(e){ console.warn('JSON parse error:', e); }
    }

    addMessage('ai', escHtml(displayText).replace(/\n/g, '<br>'));
    history.push({role:'assistant', content: fullText});

  }catch(e){
    removeTyping();
    addMessage('ai', 'Hubo un error al conectar. Verificá tu conexión e intentá de nuevo.');
    console.error(e);
  }

  isThinking = false;
  document.getElementById('sendBtn').disabled = false;
}

// ── Process cotización ────────────────────────────────────────────────────────
function procesarCotizacion(cot){
  const modelKey = cot.modelo; // 'S','M','L','XL','MAD_S', etc
  if(!COSTOS[modelKey]){ console.warn('Unknown model:', modelKey); return; }

  const d = COSTOS[modelKey];
  const cant = cot.cant || 1;
  const km = cot.km || 0;
  const linea = LINEA[modelKey];

  let items = [];
  let total = 0;

  // Base price
  items.push({name: 'Precio base', price: d.pb, isBase: true});
  total += d.pb;

  // Opcionales
  (cot.opcionales || []).forEach(opName => {
    if(opName === 'Montaje') return; // handled separately
    if(d.op[opName] !== undefined){
      if(d.op[opName] > 0){
        items.push({name: opName, price: d.op[opName], isBase: false});
        total += d.op[opName];
      }
    }
  });

  // Logística
  if(km >= 100){
    const tarifa = COSTOS_LOG_TARIFA[modelKey] || 6;
    const desc = km > 100 ? 0.7 : 1;
    const logPrice = tarifa * km * desc * MARKUP;
    items.push({name: `Logística (${km} km)`, price: logPrice, isBase: false});
    total += logPrice;
  }

  // Montaje
  if((cot.opcionales||[]).includes('Montaje') && km >= 100){
    const mt = COSTOS_MONTAJE[modelKey];
    const montajePrice = (km<=100?mt[0]:km<=500?mt[1]:km<=1200?mt[2]:mt[3]) * MARKUP;
    items.push({name: 'Montaje', price: montajePrice, isBase: false});
    total += montajePrice;
  }

  total *= cant;

  currentCot = {modelKey, cant, km, items, total, linea, opcionales: cot.opcionales||[]};
  renderPanel(currentCot);
}

function renderPanel(cot){
  document.getElementById('cotEmpty').style.display = 'none';
  const card = document.getElementById('cotCard');
  card.classList.add('visible');

  document.getElementById('cotModelo').textContent = LINEA[cot.modelKey].toUpperCase() + ' — MODELO ' + DNAME[cot.modelKey];
  document.getElementById('cotNombre').textContent = NOMBRES[cot.modelKey];

  const itemsEl = document.getElementById('cotItems');
  itemsEl.innerHTML = cot.items.map(it =>
    `<div class="cot-item ${it.isBase?'base':'opt'}">
      <span class="cot-item-name">${escHtml(it.name)}</span>
      <span class="cot-item-price">USD ${fmt(it.price)}</span>
    </div>`
  ).join('');

  if(cot.cant > 1){
    itemsEl.innerHTML += `<div class="cot-item" style="border-top:1px solid var(--border);margin-top:6px;padding-top:10px;font-size:11px;color:var(--mid)"><span>× ${cot.cant} unidades</span></div>`;
  }

  document.getElementById('cotTotal').textContent = 'USD ' + fmt(cot.total);

  // Auto-fill offer number
  if(!document.getElementById('pNum').value){
    document.getElementById('pNum').value = 'OE-' + String(Date.now()).slice(-4);
  }
}

// ── PDF Generation ────────────────────────────────────────────────────────────
function generarPDF(){
  if(!currentCot){ alert('No hay cotización para generar.'); return; }
  if(typeof window.jspdf === 'undefined'){ alert('PDF cargando, intentá en un momento.'); return; }

  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'landscape', unit:'mm', format:'a4'});

  const W=297, H=210, mg=14;
  const tW = W - mg*2;
  let y = 0;

  // Header
  const LR=[[0,0,3.7,3.7],[0,5.5,3.7,3.7],[9,0,3.7,3.7],[9,5.5,3.7,3.7],[18,0,3.7,9.2],[27,0,3.7,9.2],[27,0,18.5,3.7],[27,5.5,14.7,3.7],[27,5.5,3.7,9.2],[36.7,0,3.7,3.7],[36.7,5.5,3.7,3.7],[36.7,0,18.5,3.7],[36.7,5.5,18.5,3.7],[55.2,0,3.7,9.2],[73.7,0,3.7,9.2],[55.2,0,18.5,3.7],[55.2,5.5,18.5,3.7]];
  doc.setFillColor(26,26,26); doc.rect(0,0,W,22,'F');
  doc.setFillColor(245,244,240);
  LR.forEach(([dx,dy,w,h])=>doc.rect(mg+dx*0.6,7+dy*0.6,w*0.6,h*0.6,'F'));
  doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(138,135,127);
  doc.text('OFERTA ECONÓMICA',W-mg,11,{align:'right'});
  const num = document.getElementById('pNum').value || 'SN';
  const fecha = new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});
  doc.text(`N° ${num}  |  ${fecha}`,W-mg,16,{align:'right'});
  y = 22 + 4;

  // Client box
  const cliente = document.getElementById('pCliente').value || '—';
  const contacto = document.getElementById('pContacto').value || '—';
  const email = document.getElementById('pEmail').value || '—';
  const vendedor = document.getElementById('pVendedor').value || '—';
  const boxH=24, rowH=24/2;
  doc.setFillColor(236,234,227); doc.rect(mg,y,tW,boxH,'F');
  const metaRows=[[['Cliente',cliente],['Contacto',contacto]],[['Email',email],['Vendedor',vendedor]]];
  metaRows.forEach(function(row,ri){
    row.forEach(function(col,ci){
      const x=mg+5+ci*(tW/2), rowY=y+1.5+ri*rowH;
      doc.setFont('helvetica','bold'); doc.setFontSize(6); doc.setTextColor(138,135,127);
      doc.text(col[0].toUpperCase(),x,rowY+1.8);
      doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(10,10,10);
      doc.text(String(col[1]).substring(0,44),x,rowY+5.2);
    });
  });
  y += boxH + 5;

  // Two columns
  const colGap=6, colLw=tW*0.55, colRw=tW-colLw-colGap, colLx=mg, colRx=mg+colLw+colGap;
  let yL=y, yR=y;

  // Left: table
  doc.setFont('helvetica','bold'); doc.setFontSize(6); doc.setTextColor(138,135,127);
  doc.text('ALCANCE ECONÓMICO',colLx,yL);
  doc.setDrawColor(200,197,188); doc.setLineWidth(0.2);
  doc.line(colLx+doc.getTextWidth('ALCANCE ECONÓMICO')+2,yL-0.5,colLx+colLw,yL-0.5);
  yL+=4.5;

  const cols=[colLw*0.50,colLw*0.14,colLw*0.18,colLw*0.18];
  doc.setFillColor(10,10,10); doc.rect(colLx,yL,colLw,5.5,'F');
  doc.setTextColor(245,244,240); doc.setFont('helvetica','bold'); doc.setFontSize(6);
  ['Concepto','Cant.','Unit. (USD)','Total (USD)'].forEach(function(h,i){
    const cx=colLx+cols.slice(0,i).reduce(function(a,b){return a+b;},0);
    i===0?doc.text(h,cx+2,yL+3.8):doc.text(h,cx+cols[i]-2,yL+3.8,{align:'right'});
  });
  yL+=5.5;

  currentCot.items.forEach(function(it,idx){
    const rh=4.5;
    if(idx%2===0){doc.setFillColor(248,247,244);doc.rect(colLx,yL,colLw,rh,'F');}
    doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(10,10,10);
    [it.name,String(currentCot.cant),'USD '+fmt(it.price),'USD '+fmt(it.price*currentCot.cant)].forEach(function(v,i){
      const cx=colLx+cols.slice(0,i).reduce(function(a,b){return a+b;},0);
      i===0?doc.text(v.substring(0,48),cx+2,yL+3.2):doc.text(v,cx+cols[i]-2,yL+3.2,{align:'right'});
    });
    yL+=rh;
  });

  doc.setFillColor(10,10,10); doc.rect(colLx,yL,colLw,6.5,'F');
  doc.setTextColor(245,244,240); doc.setFont('helvetica','bold'); doc.setFontSize(7.5);
  doc.text('TOTAL OFERTA',colLx+2,yL+4.5);
  doc.text('USD '+fmt(currentCot.total),colLx+colLw-2,yL+4.5,{align:'right'});
  yL+=6.5;
  doc.setFont('helvetica','italic'); doc.setFontSize(5.5); doc.setTextColor(138,135,127);
  doc.text('* Valores en USD. No incluyen IVA (21%).',colLx,yL+3.5);
  yL+=8;

  // Conditions
  const yCondiciones=yL;
  doc.setFont('helvetica','bold'); doc.setFontSize(6); doc.setTextColor(138,135,127);
  doc.text('CONDICIONES',colLx,yL);
  doc.setDrawColor(200,197,188); doc.setLineWidth(0.2);
  doc.line(colLx+doc.getTextWidth('CONDICIONES')+2,yL-0.5,colLx+colLw,yL-0.5);
  yL+=4.5;
  doc.setFillColor(236,234,227); doc.rect(colLx,yL,colLw,11,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(5.5); doc.setTextColor(138,135,127);
  doc.text('CONDICIÓN DE PAGO',colLx+3,yL+3.5);
  doc.text('PLAZO DE ENTREGA',colLx+colLw/2+3,yL+3.5);
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(10,10,10);
  doc.text('A convenir',colLx+3,yL+8.5);
  const modelo=currentCot.modelKey;
  const plazo=(modelo==='MAD_L'||modelo==='MAD_XL'||modelo==='L'||modelo==='XL')?'4 meses':'3 meses';
  doc.text(plazo,colLx+colLw/2+3,yL+8.5);

  // Right column: descriptions
  doc.setDrawColor(210,207,198); doc.setLineWidth(0.3);
  doc.line(colRx-3,y,colRx-3,H-16);
  doc.setFont('helvetica','bold'); doc.setFontSize(6); doc.setTextColor(138,135,127);
  doc.text('PRECIO BASE INCLUYE',colRx,yR);
  doc.setDrawColor(200,197,188); doc.setLineWidth(0.2);
  doc.line(colRx+doc.getTextWidth('PRECIO BASE INCLUYE')+2,yR-0.5,colRx+colRw,yR-0.5);
  yR+=4.5;

  const binc=getBINC(currentCot.modelKey);
  doc.setFont('helvetica','normal'); doc.setFontSize(6.2); doc.setTextColor(10,10,10);
  binc.forEach(function(inc){
    doc.setFillColor(10,10,10); doc.rect(colRx,yR-1,1.2,1.2,'F');
    doc.text(doc.splitTextToSize(inc,colRw-5)[0],colRx+4,yR);
    yR+=4.2;
  });
  yR+=3; yR=yCondiciones;

  if((currentCot.opcionales||[]).length>0){
    doc.setFont('helvetica','bold'); doc.setFontSize(6); doc.setTextColor(138,135,127);
    doc.text('OPCIONALES INCLUIDOS',colRx,yR);
    doc.line(colRx+doc.getTextWidth('OPCIONALES INCLUIDOS')+2,yR-0.5,colRx+colRw,yR-0.5);
    yR+=4.5;
    doc.setFont('helvetica','normal'); doc.setFontSize(6.2); doc.setTextColor(10,10,10);
    getOpDesc(currentCot.modelKey, currentCot.opcionales, currentCot.km).forEach(function(inc){
      doc.setFillColor(60,130,90); doc.rect(colRx,yR-1,1.2,1.2,'F');
      doc.text(doc.splitTextToSize(inc,colRw-5)[0],colRx+4,yR);
      yR+=4.2;
    });
  }

  // Footer
  const fY=H-12;
  doc.setFillColor(10,10,10); doc.rect(0,fY-4,W,H,'F');
  doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(138,135,127);
  doc.text('Generado el '+fecha+'  |  LABO — Gerencia Comercial  |  labo.com.ar',mg,fY+2);
  doc.text('OE N° '+num,W-mg,fY+2,{align:'right'});

  const fileName=num.replace(/[\/\\:*?"<>|]/g,'-')+' '+(cliente||'Cliente').replace(/[\/\\:*?"<>|]/g,'-')+'.pdf';
  doc.save(fileName);
}

  if(LINEA[modelKey]==='madera') return [

    "Muros de baño revestidos en cerámica blanca 15×15 cm.",
    "Cielorrasos en placas de guatambú.",
    "Aberturas exteriores de aluminio anodizado natural con DVH.",
    "Instalación eléctrica completa con artefactos.",
    "Mobiliario de cocina en acero inoxidable pulido.",
    "Sanitarios Ferrum Bari y griferías FV Puelo. Inodoro Smart bidet.",

function getOpDesc(modelKey, opts, km){
  const isModular = LINEA[modelKey]==='modular';
  const map={
    "Platea de fundación + Granítico": isModular?"Sistema de fundación de vigas cintas.":"Platea de fundación con terminación en piso granítico.",
    "Termomecánica por AA Split": "Sistema de climatización AA frío-calor tipo Split.",
    "Piso Radiante": "Sistema de calefacción por piso radiante con caldera a gas.",
    "Línea Blanca": "Provisión de línea blanca: anafe, horno y campana extractora.",
    "Paquete Solar": "Paquete solar para generación/soporte energético.",
    "Estufa a Leña": "Estufa a leña con kit de salida, instalada y operativa.",
    "Pérgola": "Pérgola exterior.",
    "Deck": "Deck exterior.",
    "Grúa": "Servicio de grúa para izaje y posicionamiento.",
    "Montaje": "Montaje en obra de la unidad y componentes.",
  };
  const result=[];
  (opts||[]).forEach(function(o){if(map[o])result.push(map[o]);});
  if(km>=100)result.push('Logística y transporte ('+km+' km).');
  return result;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(n){return Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:0,maximumFractionDigits:0});}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Voice recognition ────────────────────────────────────────────────────────
let recognition = null;
let isRecording = false;

function initSpeech(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    document.getElementById('micBtn').style.display='none';
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'es-AR';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = function(){
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('userInput').placeholder = 'Escuchando...';
  };

  recognition.onresult = function(e){
    let interim = '';
    let final = '';
    for(let i = e.resultIndex; i < e.results.length; i++){
      if(e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('userInput').value = final || interim;
    autoResize(document.getElementById('userInput'));
  };

  recognition.onend = function(){
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('userInput').placeholder = 'Describí lo que necesitás cotizar...';
    // Auto-send if there's text
    const val = document.getElementById('userInput').value.trim();
    if(val) sendMessage();
  };

  recognition.onerror = function(e){
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('userInput').placeholder = 'Describí lo que necesitás cotizar...';
    if(e.error !== 'no-speech') console.warn('Speech error:', e.error);
  };
}

function toggleMic(){
  if(!recognition){ alert('Tu navegador no soporta reconocimiento de voz. Usá Chrome.'); return; }
  if(isRecording){
    recognition.stop();
  } else {
    document.getElementById('userInput').value = '';
    recognition.start();
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
initSpeech();
addMessage('ai', 'Hola. Soy el asistente de cotización de LABO.<br><br>Describime lo que necesitás — línea, modelo, opcionales, distancia — y armo la cotización al instante. Podés escribir o usar el micrófono 🎤');
